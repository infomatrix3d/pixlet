name: Render and Convert Tronbyt Apps

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'   # GitHub minimum supported schedule interval is 5 minutes
  workflow_dispatch:

jobs:
  render_and_convert:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebp-dev webp python3 python3-pip curl
          pip3 install pillow

      - name: Install Tronbyt Pixlet
        run: |
          curl -LO "https://github.com/tronbyt/pixlet/releases/download/v0.53.0/pixlet_v0.53.0_linux-amd64.tar.gz"
          tar -xvf "pixlet_v0.53.0_linux-amd64.tar.gz"
          chmod +x ./pixlet
          sudo mv ./pixlet /usr/local/bin/pixlet
          pixlet version

      - name: Create working directories
        run: mkdir -p apps output scripts

      - name: Download App from Tronbyt Repo
        run: |
          curl -fSLo apps/fuzzy_clock.star "https://raw.githubusercontent.com/tronbyt/apps/refs/heads/main/apps/fuzzyclock/fuzzy_clock.star"

      - name: Render .star file to animated .webp
        run: |
          pixlet render apps/fuzzy_clock.star -o output/fuzzy_clock.webp

      - name: Create WebP to packed RGB565 animation converter
        run: |
          cat > scripts/webp_to_anim_rgb565.py << 'EOF'
          from PIL import Image, ImageSequence
          import struct
          import sys

          input_file = sys.argv[1]
          output_file = sys.argv[2]
          target_width = int(sys.argv[3])
          target_height = int(sys.argv[4])
          loop_count = 0  # 0 = infinite loop

          MAGIC = b'R565'
          VERSION = 1

          def rgb888_to_rgb565(r, g, b):
              return ((r & 0xF8) << 8) | ((g & 0xFC) << 3) | (b >> 3)

          img = Image.open(input_file)

          frames = []
          delays = []

          for frame in ImageSequence.Iterator(img):
              rgba = frame.convert("RGBA")

              # Flatten transparency onto black background
              canvas = Image.new("RGBA", rgba.size, (0, 0, 0, 255))
              composed = Image.alpha_composite(canvas, rgba).convert("RGB")

              # Resize to HUB75 panel size
              composed = composed.resize((target_width, target_height), Image.Resampling.LANCZOS)

              # Frame delay (ms)
              delay = frame.info.get("duration", img.info.get("duration", 100))
              if delay is None or delay <= 0:
                  delay = 100

              frames.append(composed)
              delays.append(int(delay))

          if not frames:
              raise RuntimeError("No frames found in animated WebP")

          with open(output_file, "wb") as f:
              # Header:
              # magic[4], version, width, height, frameCount, loopCount, reserved
              f.write(struct.pack(
                  "<4sHHHHHH",
                  MAGIC,
                  VERSION,
                  target_width,
                  target_height,
                  len(frames),
                  loop_count,
                  0
              ))

              # Each frame:
              # delayMs (uint16), reserved (uint16), RGB565 pixel data
              for idx, frame in enumerate(frames):
                  f.write(struct.pack("<HH", delays[idx], 0))
                  pixels = frame.load()
                  for y in range(target_height):
                      for x in range(target_width):
                          r, g, b = pixels[x, y]
                          rgb565 = rgb888_to_rgb565(r, g, b)
                          f.write(struct.pack("<H", rgb565))

          print(f"Packed {len(frames)} frame(s) into {output_file}")
          print(f"Resolution: {target_width}x{target_height}")
          print(f"Delays: {delays}")
          EOF

      - name: Convert WebP to packed RGB565 animation
        run: |
          python3 scripts/webp_to_anim_rgb565.py output/fuzzy_clock.webp output/fuzzy_clock.anim 128 64

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add output/fuzzy_clock.webp
          git add output/fuzzy_clock.anim

          # Only commit if files actually changed
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated update of fuzzy_clock assets [skip ci]"
            git push
          fi

