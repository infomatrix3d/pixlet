name: Render Pixlet WebP

on:
  push:
    branches: [ main ]
    paths:
      - 'pixlet/**'
      - '.github/workflows/render-pixlet.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Pixlet
        run: |
          set -euxo pipefail
          curl -L -o pixlet.tar.gz https://github.com/tronbyt/pixlet/releases/download/v0.52.0/pixlet_v0.52.0_linux_amd64.tar.gz
          tar -xzf pixlet.tar.gz
          chmod +x pixlet
          sudo mv pixlet /usr/local/bin/pixlet
          pixlet version

      - name: Render Pixlet app
        run: |
          set -euxo pipefail
          mkdir -p out
          pixlet render pixlet/fuzzyclock.star -o out/fuzzyclock.webp
          ls -lah out
          file out/fuzzyclock.webp

      - name: Create index page
        run: |
          cat > out/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>Pixlet Outputs</title></head>
          <body>
            <h1>Pixlet Outputs</h1>
            <ul>
              <li><a href="fuzzyclock.webp">fuzzyclock.webp</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/

  deploy:
    environment:
      name: github-pages
