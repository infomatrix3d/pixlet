name: Build Latest Pixlet and Render GIFs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  TZ: "America/Toronto"
  USE_2X: "true"

permissions:
  contents: write

jobs:
  render_gifs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make curl git libwebp-dev nodejs npm golang

      - name: Clone latest Tronbyt Pixlet
        run: |
          git clone --depth 1 https://github.com/Tronbyt/pixlet.git tronbyt-pixlet
          cd tronbyt-pixlet
          git log -1 --oneline

      - name: Build latest Pixlet from source
        run: |
          set -euo pipefail
          cd tronbyt-pixlet
          npm --prefix=frontend install
          npm --prefix=frontend run build
          make build
          ./pixlet version || true

      - name: Show Pixlet help
        run: |
          cd tronbyt-pixlet
          echo "=== pixlet render --help ==="
          ./pixlet render --help || true
          echo
          echo "=== pixlet serve --help ==="
          ./pixlet serve --help || true

      - name: Detect GIF render capability
        shell: bash
        run: |
          set -euo pipefail
          cd tronbyt-pixlet

          if ./pixlet render --help 2>&1 | grep -q -- '--gif'; then
            echo "PIXLET_RENDER_GIF_FLAG=true" >> "$GITHUB_ENV"
            echo "Detected: pixlet render supports --gif"
          else
            echo "PIXLET_RENDER_GIF_FLAG=false" >> "$GITHUB_ENV"
            echo "Detected: pixlet render does NOT expose --gif; workflow will still try .gif output and validate the header"
          fi

      - name: Create output directory
        run: mkdir -p output

      - name: Clean old generated GIFs
        run: |
          mkdir -p output
          if [ "${USE_2X}" = "true" ]; then
            find output -type f -name "*2x.gif" -delete
          else
            find output -type f -name "*.gif" -delete
          fi

      - name: Render all .star files to GIF
        shell: bash
        run: |
          set -euo pipefail
          found_any=false

          PIXLET_BIN="$GITHUB_WORKSPACE/tronbyt-pixlet/pixlet"

          while IFS= read -r file; do
            found_any=true

            rel="${file#apps/}"
            stem="${rel%.star}"
            safe_name="${stem//\//_}"

            if [ "${USE_2X}" = "true" ]; then
              gif="output/${safe_name}2x.gif"
              if [ "${PIXLET_RENDER_GIF_FLAG}" = "true" ]; then
                "$PIXLET_BIN" render --gif -2 "$file" -o "$gif"
              else
                "$PIXLET_BIN" render -2 "$file" -o "$gif"
              fi
            else
              gif="output/${safe_name}.gif"
              if [ "${PIXLET_RENDER_GIF_FLAG}" = "true" ]; then
                "$PIXLET_BIN" render --gif "$file" -o "$gif"
              else
                "$PIXLET_BIN" render "$file" -o "$gif"
              fi
            fi

            echo "Rendered: $gif"

            header="$(head -c 6 "$gif" || true)"
            echo "$gif -> header: $header"

            if [ "$header" != "GIF87a" ] && [ "$header" != "GIF89a" ]; then
              echo "ERROR: $gif is not a real GIF file"
              echo "This Pixlet build did not emit GIF bytes for this command path."
              echo "Check the help output above and update the render invocation accordingly."
              exit 1
            fi
          done < <(find apps -type f -name "*.star" | sort)

          if [ "$found_any" = "false" ]; then
            echo "No .star files found under apps/"
            exit 1
          fi

      - name: Show generated files
        run: |
          find output -type f | sort

      - name: Commit and push generated GIFs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A output

          if ! git diff --staged --quiet; then
            git commit -m "Update Pixlet GIF renders [skip ci]"
            git push origin main
          else
            echo "No rendering changes detected."
          fi
