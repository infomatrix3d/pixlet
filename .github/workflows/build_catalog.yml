name: Build Tronbyt Catalog

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout your repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # Clone Tronbyt apps repo
      - name: Clone Tronbyt apps repo
        run: |
          git clone --depth=1 https://github.com/tronbyt/apps.git

      # Optional debug
      - name: List available apps
        run: |
          ls -la apps/apps

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Setup Go (required to install Pixlet)
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # Install Pixlet
      - name: Install Pixlet
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libwebp-dev
          go install github.com/tronbyt/pixlet@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          "$HOME/go/bin/pixlet" version || "$HOME/go/bin/pixlet" --help

      # Build catalog + schemas
      - name: Generate catalog
        run: |
          python scripts/build_catalog.py \
            --community apps \
            --allowed allowed_apps.txt \
            --output output

      # Render WEBP previews
      # Your render_webp.py should:
      # - always generate default.webp
      # - always generate default_2x.webp
      # - generate extra variants from render_variants.json
      # - write output/webp/index.json
      # - continue if one app/variant fails when --continue-on-error is passed
      - name: Render WEBP files
        run: |
          python scripts/render_webp.py \
            --community apps/apps \
            --allowed allowed_apps.txt \
            --variants render_variants.json \
            --output output/webp \
            --continue-on-error

      # Cleanup cloned community repo so it doesn't get committed
      - name: Cleanup workspace
        run: |
          rm -rf apps

      # Commit generated output only
      - name: Commit changes
        run: |
          git config user.name "catalog-bot"
          git config user.email "actions@github.com"

          git add output/

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update catalog and webp previews"
            git push
          fi
