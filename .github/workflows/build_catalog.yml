name: Build Tronbyt Catalog

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone Tronbyt apps repo
        run: |
          git clone --depth=1 https://github.com/tronbyt/apps.git

      - name: List available apps
        run: |
          ls -la apps/apps

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ✅ Install Pixlet
      - name: Install Pixlet
        run: |
          curl -LO https://github.com/tronbyt/pixlet/releases/download/v0.53.0/pixlet_v0.53.0_linux-amd64.tar.gz
          tar -xvf pixlet_v0.53.0_linux-amd64.tar.gz
          chmod +x pixlet
          sudo mv pixlet /usr/local/bin/pixlet
          pixlet version

      - name: Generate catalog
        run: |
          python scripts/build_catalog.py \
            --community apps \
            --allowed allowed_apps.txt \
            --output output

      - name: Render WEBP files
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
          STOCKS_API_TOKEN: ${{ secrets.STOCKS_API_TOKEN }}
        run: |
          python scripts/render_webp.py \
            --community apps/apps \
            --allowed allowed_apps.txt \
            --variants render_variants.json \
            --output output/webp \
            --continue-on-error



      - name: Create Embeddable Web Catalog (index.html)
        shell: bash
        run: |
          set -euo pipefail

          RAW_BASE_URL="https://infomatrix3d.github.io/pixlet"

          cat <<'EOF' > index.template.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>InfoMatrix Pixlet App Catalog</title>
            <style>
              :root {
                --bg: #f6f8fa;
                --card: #ffffff;
                --text: #1f2328;
                --muted: #656d76;
                --border: #d0d7de;
                --shadow: 0 6px 18px rgba(31, 35, 40, 0.08);
                --primary: #0969da;
                --primary-hover: #0550ae;
                --success: #1a7f37;
                --success-hover: #116329;
                --badge: #eaeef2;
              }

              * { box-sizing: border-box; }

              body {
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                background: var(--bg);
                color: var(--text);
              }

              .page {
                max-width: 1400px;
                margin: 0 auto;
                padding: 24px;
              }

              .hero {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
                margin-bottom: 24px;
              }

              .hero h1 {
                margin: 0;
                font-size: 30px;
                font-weight: 700;
              }

              .hero p {
                margin: 6px 0 0 0;
                color: var(--muted);
                font-size: 14px;
              }

              .toolbar {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                align-items: center;
              }

              .search {
                min-width: 280px;
                padding: 10px 12px;
                border: 1px solid var(--border);
                border-radius: 10px;
                font-size: 14px;
                outline: none;
                background: #fff;
              }

              .stats {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
              }

              .pill {
                background: #fff;
                border: 1px solid var(--border);
                border-radius: 999px;
                padding: 8px 12px;
                font-size: 13px;
                color: var(--muted);
              }

              .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
                gap: 20px;
              }

              .card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 18px;
                box-shadow: var(--shadow);
                overflow: hidden;
                display: flex;
                flex-direction: column;
              }

              .card-header {
                padding: 18px 18px 0 18px;
                display: flex;
                justify-content: space-between;
                gap: 12px;
                align-items: flex-start;
              }

              .card-title-wrap {
                min-width: 0;
              }

              .card-title {
                margin: 0;
                font-size: 18px;
                font-weight: 700;
                word-break: break-word;
              }

              .meta {
                margin-top: 8px;
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
              }

              .badge {
                background: var(--badge);
                color: var(--muted);
                border-radius: 999px;
                padding: 5px 10px;
                font-size: 12px;
                font-weight: 600;
              }

              .preview-shell {
                margin: 16px 18px 0 18px;
                border-radius: 16px;
                background: #0b0f14;
                padding: 16px;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 150px;
              }

              .preview-shell img {
                width: 192px;
                max-width: 100%;
                image-rendering: pixelated;
                image-rendering: crisp-edges;
                display: block;
              }

              .actions {
                padding: 16px 18px 18px 18px;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
              }

              .btn {
                border: none;
                border-radius: 12px;
                padding: 10px 12px;
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                transition: 0.2s ease;
                text-align: center;
                color: #fff;
                display: inline-flex;
                align-items: center;
                justify-content: center;
              }

              .btn-primary {
                background: var(--primary);
              }

              .btn-primary:hover {
                background: var(--primary-hover);
              }

              .btn-success {
                background: var(--success);
              }

              .btn-success:hover {
                background: var(--success-hover);
              }

              .btn-wide {
                grid-column: 1 / -1;
              }

              .variants {
                border-top: 1px solid var(--border);
                padding: 0 18px 18px 18px;
                display: none;
              }

              .variants.open {
                display: block;
              }

              .variants-title {
                margin: 16px 0 12px 0;
                font-size: 14px;
                font-weight: 700;
                color: var(--muted);
              }

              .variant-list {
                display: flex;
                flex-direction: column;
                gap: 12px;
              }

              .variant-item {
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 12px;
                background: #fff;
              }

              .variant-top {
                display: grid;
                grid-template-columns: 84px 1fr;
                gap: 12px;
                align-items: start;
              }

              .variant-preview {
                background: #0b0f14;
                border-radius: 12px;
                padding: 8px;
                min-height: 58px;
                display: flex;
                align-items: center;
                justify-content: center;
              }

              .variant-preview img {
                width: 100%;
                max-width: 64px;
                image-rendering: pixelated;
                image-rendering: crisp-edges;
              }

              .variant-name-row {
                display: flex;
                justify-content: space-between;
                gap: 10px;
                align-items: center;
                margin-bottom: 6px;
              }

              .variant-name {
                margin: 0;
                font-size: 14px;
                font-weight: 700;
                word-break: break-word;
              }

              .variant-scale {
                background: var(--badge);
                border-radius: 999px;
                padding: 4px 8px;
                font-size: 11px;
                color: var(--muted);
                white-space: nowrap;
              }

              .config-box {
                margin-top: 8px;
                background: #f6f8fa;
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 8px 10px;
                font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
                font-size: 12px;
                color: var(--muted);
                white-space: pre-wrap;
                word-break: break-word;
              }

              .variant-actions {
                margin-top: 10px;
                display: grid;
                grid-template-columns: 1fr;
                gap: 8px;
              }

              .empty {
                padding: 40px 16px;
                text-align: center;
                color: var(--muted);
                background: #fff;
                border: 1px dashed var(--border);
                border-radius: 16px;
              }

              @media (max-width: 720px) {
                .actions,
                .variant-actions {
                  grid-template-columns: 1fr;
                }

                .preview-shell img {
                  width: 160px;
                }

                .variant-top {
                  grid-template-columns: 1fr;
                }
              }
            </style>
          </head>
          <body>
            <div class="page">
              <div class="hero">
                <div>
                  <h1>📺 InfoMatrix App Catalog</h1>
                  
                </div>

                <div class="toolbar">
                  <input id="searchInput" class="search" type="text" placeholder="Search apps..." />
                  <div class="stats">
                    <div class="pill" id="statApps">Apps: 0</div>
                    <div class="pill" id="statVariants">Variants: 0</div>
                  </div>
                </div>
              </div>

              <div id="catalog" class="grid"></div>
            </div>

            <script>
              const RAW_BASE_URL = "__RAW_BASE_URL__";
              const INDEX_PATH = "output/webp/index.json";

              async function loadCatalog() {
                const response = await fetch(INDEX_PATH, { cache: "no-store" });
                if (!response.ok) {
                  throw new Error(`Failed to load ${INDEX_PATH}: ${response.status}`);
                }
                return response.json();
              }

              function assetUrl(relPath) {
                return `${RAW_BASE_URL}/${relPath}`;
              }

              function escapeHtml(str) {
                return String(str)
                  .replaceAll("&", "&amp;")
                  .replaceAll("<", "&lt;")
                  .replaceAll(">", "&gt;")
                  .replaceAll('"', "&quot;")
                  .replaceAll("'", "&#039;");
              }

              function formatConfig(config) {
                if (!config || Object.keys(config).length === 0) {
                  return "No config";
                }
                return JSON.stringify(config, null, 2);
              }

              async function copyText(btn, text) {
                const original = btn.textContent;
                try {
                  if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
                    await navigator.clipboard.writeText(text);
                  } else {
                    const ta = document.createElement("textarea");
                    ta.value = text;
                    ta.style.position = "fixed";
                    ta.style.left = "-9999px";
                    document.body.appendChild(ta);
                    ta.focus();
                    ta.select();
                    document.execCommand("copy");
                    document.body.removeChild(ta);
                  }
                  btn.textContent = "✓ Copied!";
                  setTimeout(() => btn.textContent = original, 1800);
                } catch (e) {
                  console.error(e);
                  prompt("Copy manually:", text);
                }
              }

              function findEntry(entries, name) {
                return entries.find(x => x.name === name);
              }

              function variantEntries(entries) {
                return entries.filter(x => x.name !== "default" && x.name !== "default_2x");
              }

              function createVariantItem(appName, entry) {
                const rawUrl = assetUrl(entry.file);
                const configText = formatConfig(entry.config);

                return `
                  <div class="variant-item">
                    <div class="variant-top">
                      <div class="variant-preview">
                        <img src="${escapeHtml(entry.file)}" alt="${escapeHtml(entry.name)}">
                      </div>
                      <div>
                        <div class="variant-name-row">
                          <h4 class="variant-name">${escapeHtml(entry.name)}</h4>
                          <span class="variant-scale">${entry.is_2x ? "2x" : "1x"}</span>
                        </div>
                     <!--   <div class="config-box">${escapeHtml(configText)}</div> -->
                        <div class="variant-actions">
                          <button class="btn btn-success" onclick="copyText(this, '${rawUrl}')">Copy Variant URL</button>
                        </div>
                      </div>
                    </div>
                  </div>
                `;
              }

              function createAppCard(appName, entries) {
                const defaultEntry = findEntry(entries, "default");
                const default2xEntry = findEntry(entries, "default_2x");
                const variants = variantEntries(entries);

                const variantCount = variants.length;
                const defaultRaw = defaultEntry ? assetUrl(defaultEntry.file) : "";
                const default2xRaw = default2xEntry ? assetUrl(default2xEntry.file) : "";

                return `
                  <div class="card" data-app-name="${escapeHtml(appName.toLowerCase())}">
                    <div class="card-header">
                      <div class="card-title-wrap">
                        <h3 class="card-title">${escapeHtml(appName)}</h3>
                        <!-- <div class="meta">
                          <span class="badge">default</span>
                          <span class="badge">default 2x</span>
                          <span class="badge">${variantCount} variant${variantCount === 1 ? "" : "s"}</span>
                        </div> -->
                      </div>
                    </div>

                    <div class="preview-shell">
                      ${
                        defaultEntry
                          ? `<img src="${escapeHtml(defaultEntry.file)}" alt="${escapeHtml(appName)} default preview">`
                          : `<div class="empty">No default preview</div>`
                      }
                    </div>

                    <div class="actions">
                      <button class="btn btn-success" onclick="copyText(this, '${defaultRaw}')">Copy Default URL</button>
                      <button class="btn btn-success" onclick="copyText(this, '${default2xRaw}')">Copy Default 2x URL</button>
                      <button class="btn btn-primary btn-wide" onclick="toggleVariants(this)">Show Variants (${variantCount})</button>
                    </div>

                    <div class="variants">
                      <div class="variants-title">Variants</div>
                      <div class="variant-list">
                        ${
                          variants.length
                            ? variants.map(v => createVariantItem(appName, v)).join("")
                            : `<div class="empty">No additional variants</div>`
                        }
                      </div>
                    </div>
                  </div>
                `;
              }

              function toggleVariants(btn) {
                const card = btn.closest(".card");
                const variants = card.querySelector(".variants");
                variants.classList.toggle("open");
                btn.textContent = variants.classList.contains("open")
                  ? "Hide Variants"
                  : `Show Variants (${card.querySelectorAll('.variant-item').length})`;
              }

              function applySearch() {
                const value = document.getElementById("searchInput").value.trim().toLowerCase();
                const cards = document.querySelectorAll(".card");
                let visible = 0;

                cards.forEach(card => {
                  const appName = card.dataset.appName || "";
                  const show = appName.includes(value);
                  card.style.display = show ? "" : "none";
                  if (show) visible++;
                });

                document.getElementById("statApps").textContent = `Apps: ${visible}`;
              }

              async function init() {
                const catalogEl = document.getElementById("catalog");

                try {
                  const data = await loadCatalog();
                  const appNames = Object.keys(data).sort((a, b) => a.localeCompare(b));

                  let totalVariants = 0;
                  for (const appName of appNames) {
                    totalVariants += variantEntries(data[appName]).length;
                  }

                  document.getElementById("statApps").textContent = `Apps: ${appNames.length}`;
                  document.getElementById("statVariants").textContent = `Variants: ${totalVariants}`;

                  if (!appNames.length) {
                    catalogEl.innerHTML = `<div class="empty">No apps found in output/webp/index.json</div>`;
                    return;
                  }

                  catalogEl.innerHTML = appNames.map(appName => createAppCard(appName, data[appName])).join("");

                  document.getElementById("searchInput").addEventListener("input", applySearch);
                } catch (err) {
                  console.error(err);
                  catalogEl.innerHTML = `<div class="empty">Failed to load catalog metadata.<br>${escapeHtml(err.message)}</div>`;
                }
              }

              init();
            </script>
          </body>
          </html>
          EOF

          sed "s|__RAW_BASE_URL__|${RAW_BASE_URL}|g" index.template.html > index.html
          rm -f index.template.html

      - name: Show generated files
        run: |
          find output -type f | sort
          ls -la index.html

      - name: Cleanup workspace
        run: |
          rm -rf apps

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main

          git add -A output index.html

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update catalog, webp previews, and index page"
            git push origin HEAD:main
          fi
