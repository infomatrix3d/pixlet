name: Render Specific Tronbyt App

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  render:
    runs-on: ubuntu-latest

    env:
      APP_DIR: apps/weather/weather
      APP_FILE: weather.star
      APP_NAME: weather

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v6

      - name: Checkout only the target app from Tronbyt apps repo
        uses: actions/checkout@v6
        with:
          repository: Tronbyt/apps
          path: tronbyt-apps
          sparse-checkout: |
            ${{ env.APP_DIR }}
          sparse-checkout-cone-mode: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Build Tronbyt Pixlet from source
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/tronbyt/pixlet.git
          cd pixlet
          go build -o ../pixlet .
          cd ..
          chmod +x ./pixlet
          ./pixlet version

      - name: Render app
        run: |
          set -euo pipefail
          ./pixlet render "tronbyt-apps/${APP_DIR}/${APP_FILE}"

      - name: Verify output exists
        run: |
          set -euo pipefail
          test -f "tronbyt-apps/${APP_DIR}/${APP_NAME}.webp"
          ls -lh "tronbyt-apps/${APP_DIR}/${APP_NAME}.webp"

      - name: Upload rendered webp
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-webp
          path: tronbyt-apps/${{ env.APP_DIR }}/${{ env.APP_NAME }}.webp
