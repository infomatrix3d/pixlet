name: Render Specific Tronbyt App From Upstream Repo

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    env:
      PIXLET_VERSION: v0.52.0
      APP_DIR: apps/weather/weather
      APP_FILE: weather.star
      APP_NAME: weather

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Checkout only the target app from tronbyt/apps
        uses: actions/checkout@v4
        with:
          repository: Tronbyt/apps
          path: tronbyt-apps
          sparse-checkout: |
            ${{ env.APP_DIR }}
          sparse-checkout-cone-mode: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl tar

      - name: Download Tronbyt Pixlet
        run: |
          set -euo pipefail
      
          PIXLET_VERSION="v0.52.0"
          URL="https://github.com/tronbyt/pixlet/releases/download/${PIXLET_VERSION}/pixlet_${PIXLET_VERSION#v}_linux_amd64.tar.gz"
      
          echo "Downloading: $URL"
          curl -fL "$URL" -o pixlet.tar.gz
      
          echo "Downloaded file details:"
          ls -lh pixlet.tar.gz
          file pixlet.tar.gz
      
          tar -xzf pixlet.tar.gz
          chmod +x pixlet
          ./pixlet version

      - name: Render app
        run: |
          set -euo pipefail
          ./pixlet render "tronbyt-apps/${APP_DIR}/${APP_FILE}"

      - name: Verify output
        run: |
          test -f "tronbyt-apps/${APP_DIR}/${APP_NAME}.webp"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-webp
          path: tronbyt-apps/${{ env.APP_DIR }}/${{ env.APP_NAME }}.webp
