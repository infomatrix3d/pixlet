name: Render Pixlet Apps (Debug Safe)

on:
  workflow_dispatch:
    inputs:
      tenant_start:
        description: "Start tenant ID"
        required: true
        default: "1001"
      tenant_end:
        description: "End tenant ID"
        required: true
        default: "1001"

permissions:
  contents: read

env:
  TZ: "America/Toronto"
  CF_WORKER_BASE_URL: ${{ secrets.CF_WORKER_BASE_URL }}

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}

    steps:
      - name: Build tenant matrix
        id: build-matrix
        run: |
          START="${{ github.event.inputs.tenant_start }}"
          END="${{ github.event.inputs.tenant_end }}"

          python - <<'PY'
          import json, os

          start = int(os.environ["START"])
          end = int(os.environ["END"])

          matrix = {"include": []}
          for t in range(start, end + 1):
              matrix["include"].append({"tenant": str(t)})

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("matrix=" + json.dumps(matrix))
          PY
        env:
          START: ${{ github.event.inputs.tenant_start }}
          END: ${{ github.event.inputs.tenant_end }}

  render:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Clone apps repo
        run: |
          git clone --depth=1 https://github.com/tronbyt/apps.git tronbyt-apps

      # ✅ FIXED Pixlet install
      - name: Install Pixlet
        run: |
          curl -LO "https://github.com/tronbyt/pixlet/releases/download/v0.53.0/pixlet_v0.53.0_linux-amd64.tar.gz"
          tar -xvf pixlet_v0.53.0_linux-amd64.tar.gz
          chmod +x pixlet
          sudo mv pixlet /usr/local/bin/pixlet
          pixlet version

      - name: Fetch manifest (DEBUG SAFE)
        run: |
          set -euo pipefail

          mkdir -p work out/${{ matrix.tenant }}

          echo "=== Calling Worker ==="

          RESPONSE=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -H "x-api-key: ${{ secrets.CF_INTERNAL_API_KEY }}" \
            "${CF_WORKER_BASE_URL}/internal/render-manifest?tenant=${{ matrix.tenant }}")

          echo "$RESPONSE" > work/raw.txt

          echo "====== RAW RESPONSE ======"
          cat work/raw.txt
          echo "=========================="

          BODY=$(sed '$d' work/raw.txt)
          STATUS=$(tail -n1 work/raw.txt | cut -d: -f2)

          echo "HTTP STATUS: $STATUS"

          echo "$BODY" > work/manifest.json

          # ✅ Fail clearly if error
          if [ "$STATUS" != "200" ]; then
            echo "❌ Worker returned HTTP $STATUS"
            exit 1
          fi

          if [ ! -s work/manifest.json ]; then
            echo "❌ Empty manifest file"
            exit 1
          fi

          echo "=== VALIDATING JSON ==="
          jq . work/manifest.json

      - name: Render apps (DEBUG SAFE)
        run: |
          set -euo pipefail

          python - <<'PY'
          import json, os, subprocess, glob

          tenant = os.environ["TENANT"]

          with open("work/manifest.json", "r") as f:
              raw = f.read().strip()

          print("=== RAW JSON ===")
          print(raw)

          if not raw:
              print("No manifest data, skipping tenant")
              exit(0)

          data = json.loads(raw)

          apps = data.get("apps", [])
          print("Apps to render:", apps)

          if not apps:
              print("No enabled apps, skipping")
              exit(0)

          for app in apps:
              app_name = app["name"]
              cfg = app.get("config", {})

              print(f"--- Processing {app_name} ---")
              print("Config:", cfg)

              app_dir = f"tronbyt-apps/apps/{app_name}"
              star_files = glob.glob(app_dir + "/*.star")

              if not star_files:
                  print("No .star file found, skipping")
                  continue

              star_file = star_files[0]
              out_file = f"out/{tenant}/{app_name}.webp"

              os.makedirs(f"out/{tenant}", exist_ok=True)

              # Build args
              args = ["pixlet", "render", star_file]

              for k, v in cfg.items():
                  if isinstance(v, bool):
                      v = "True" if v else "False"
                  args.append(f"{k}={v}")

              args.extend(["-o", out_file])

              print("Running:", " ".join(args))

              subprocess.run(args, check=True)
          PY
        env:
          TENANT: ${{ matrix.tenant }}

      - name: Show outputs
        run: |
          echo "=== Generated files ==="
          find out -type f || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tenant-${{ matrix.tenant }}
          path: out/${{ matrix.tenant }}
