name: Render Pixlet Apps

on:
  workflow_dispatch:
    inputs:
      tenant_start:
        description: "Start tenant ID"
        required: true
        default: "1001"
      tenant_end:
        description: "End tenant ID"
        required: true
        default: "1010"


permissions:
  contents: read

env:
  TZ: "America/Toronto"
  CF_WORKER_BASE_URL: ${{ secrets.CF_WORKER_BASE_URL }}

jobs:
  plan:
    name: Build tenant matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}

    steps:
      - name: Build tenant matrix JSON
        id: build-matrix
        shell: bash
        run: |
          START="${{ github.event.inputs.tenant_start || '1001' }}"
          END="${{ github.event.inputs.tenant_end || '1010' }}"

          python - <<'PY'
          import json, os

          start = int(os.environ["START"])
          end = int(os.environ["END"])

          matrix = {"include": []}
          for tenant in range(start, end + 1):
              matrix["include"].append({"tenant": str(tenant)})

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write("matrix=" + json.dumps(matrix) + "\n")
          PY
        env:
          START: ${{ github.event.inputs.tenant_start || '1001' }}
          END: ${{ github.event.inputs.tenant_end || '1010' }}

  render:
    name: Render tenant ${{ matrix.tenant }}
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Clone Tronbyt apps repo
        shell: bash
        run: |
          git clone --depth=1 https://github.com/tronbyt/apps.git tronbyt-apps

      - name: Install Pixlet
        shell: bash
        run: |
          curl -LO "https://github.com/tronbyt/pixlet/releases/download/v0.53.0/pixlet_v0.53.0_linux-amd64.tar.gz"
          tar -xvf "pixlet_v0.53.0_linux-amd64.tar.gz"
          chmod +x ./pixlet
          sudo mv ./pixlet /usr/local/bin/pixlet
          pixlet version

      - name: Fetch enabled app manifest for tenant
        shell: bash
        run: |
          mkdir -p work out/${{ matrix.tenant }}

          curl -sS \
            -H "x-api-key: ${{ secrets.CF_INTERNAL_API_KEY }}" \
            "${CF_WORKER_BASE_URL}/internal/render-manifest?tenant=${{ matrix.tenant }}" \
            -o work/manifest.json

          echo "Manifest:"
          cat work/manifest.json

      - name: Render enabled apps
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import glob
          import shlex

          tenant = os.environ["TENANT"]
          manifest_file = "work/manifest.json"
          apps_root = "tronbyt-apps/apps"
          out_root = f"out/{tenant}"

          with open(manifest_file, "r", encoding="utf-8") as f:
              data = json.load(f)

          apps = data.get("apps", [])
          if not apps:
              print(f"No enabled apps for tenant {tenant}")
              raise SystemExit(0)

          def fmt(v):
              if isinstance(v, bool):
                  return "True" if v else "False"
              if isinstance(v, (int, float)):
                  return str(v)
              return json.dumps(v)

          for app in apps:
              app_name = app["name"]
              cfg = app.get("config", {}) or {}

              app_dir = os.path.join(apps_root, app_name)
              star_files = glob.glob(os.path.join(app_dir, "*.star"))

              if not star_files:
                  print(f"Skipping {app_name}: no .star file found in {app_dir}")
                  continue

              star_file = star_files[0]
              output_file = os.path.join(out_root, f"{app_name}.webp")

              args = ["/usr/local/bin/pixlet", "render", star_file]
              for k, v in cfg.items():
                  args.append(f"{k}={fmt(v)}")
              args.extend(["-o", output_file])

              print("Running:", " ".join(shlex.quote(a) for a in args))
              subprocess.run(args, check=True)

          PY
        env:
          TENANT: ${{ matrix.tenant }}

      - name: Upload tenant renders
        uses: actions/upload-artifact@v4
        with:
          name: tenant-${{ matrix.tenant }}-renders
          path: out/${{ matrix.tenant }}

  publish:
    name: Publish renders to private repo
    needs: render
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-renders

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_PUSH_TOKEN }}
          path: private-repo

      - name: Copy renders into private repo
        shell: bash
        run: |
          mkdir -p private-repo/renders

          find downloaded-renders -type f -name "*.webp" | while read -r file; do
            tenant=$(echo "$file" | grep -oE '/[0-9]+/' | head -n1 | tr -d '/')
            app_file=$(basename "$file")

            mkdir -p "private-repo/renders/${tenant}"
            cp "$file" "private-repo/renders/${tenant}/${app_file}"
          done

          find private-repo/renders -type f | sort

      - name: Commit and push
        shell: bash
        run: |
          cd private-repo
          git config user.name "pixlet-render-bot"
          git config user.email "actions@github.com"

          git add renders/

          if git diff --cached --quiet; then
            echo "No changes to publish"
          else
            git commit -m "Update rendered Pixlet WebP outputs"
            git push
          fi
