name: Render and Convert All Pixlet Apps

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

env:
  # Render at 2x (128x64) directly from Pixlet
  USE_2X: "true"

  PANEL_WIDTH: "128"
  PANEL_HEIGHT: "64"

  # Animation reduction knobs
  FRAME_STEP: "1"       # 1 = keep all frames
  MAX_FRAMES: "60"      # cap output frame count
  MIN_DELAY_MS: "50"    # minimum per-frame delay

jobs:
  render_and_convert:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebp-dev webp imagemagick python3 python3-pip curl
          pip3 install pillow

      - name: Install Pixlet
        run: |
          curl -LO "https://github.com/tronbyt/pixlet/releases/download/v0.53.0/pixlet_v0.53.0_linux-amd64.tar.gz"
          tar -xvf "pixlet_v0.53.0_linux-amd64.tar.gz"
          chmod +x ./pixlet
          sudo mv ./pixlet /usr/local/bin/pixlet
          pixlet version

      - name: Create working directories
        run: |
          mkdir -p output scripts tmp_frames

      - name: Create PNG frames to packed RGB565 converter
        run: |
          cat > scripts/png_frames_to_anim_rgb565.py << 'EOF'
          from PIL import Image
          import struct
          import sys
          import os
          import glob

          frames_dir = sys.argv[1]
          output_file = sys.argv[2]

          WIDTH = int(os.environ.get("PANEL_WIDTH", "128"))
          HEIGHT = int(os.environ.get("PANEL_HEIGHT", "64"))

          FRAME_STEP = int(os.environ.get("FRAME_STEP", "1"))
          MAX_FRAMES = int(os.environ.get("MAX_FRAMES", "60"))
          MIN_DELAY_MS = int(os.environ.get("MIN_DELAY_MS", "50"))

          MAGIC = b'R565'
          VERSION = 1
          LOOP_COUNT = 0

          def rgb888_to_rgb565(r, g, b):
              return ((r & 0xF8) << 8) | ((g & 0xFC) << 3) | (b >> 3)

          def compute_signature_rgb(img):
              pixels = img.load()
              w, h = img.size
              sample_cols = 8
              sample_rows = 4
              sig = 0x811C9DC5

              for sy in range(sample_rows):
                  y = (sy * (h - 1)) // (sample_rows - 1)
                  for sx in range(sample_cols):
                      x = (sx * (w - 1)) // (sample_cols - 1)
                      r, g, b = pixels[x, y]
                      px = rgb888_to_rgb565(r, g, b)
                      sig ^= px
                      sig = (sig * 16777619) & 0xFFFFFFFF
                      sig ^= ((x << 16) ^ y) & 0xFFFFFFFF
                      sig = (sig * 16777619) & 0xFFFFFFFF

              return sig

          frame_files = sorted(glob.glob(os.path.join(frames_dir, "frame_*.png")))
          if not frame_files:
              raise RuntimeError(f"No extracted PNG frames found in {frames_dir}")

          print(f"Extracted PNG frame files: {len(frame_files)}")

          frames = []
          delays = []

          # We use a fixed delay here because ImageMagick extraction alone does not carry
          # per-frame timing into the filenames. If needed, this can be extended later.
          fixed_delay = max(MIN_DELAY_MS, 100)

          output_idx = 0
          for i, frame_file in enumerate(frame_files):
              if FRAME_STEP > 1 and (i % FRAME_STEP != 0):
                  continue

              img = Image.open(frame_file).convert("RGB")
              img = img.resize((WIDTH, HEIGHT), Image.Resampling.LANCZOS)

              sig = compute_signature_rgb(img)
              print(f"Frame {i:03d} -> output idx {output_idx:03d}, sig=0x{sig:08X}")

              frames.append(img)
              delays.append(fixed_delay)
              output_idx += 1

              if len(frames) >= MAX_FRAMES:
                  break

          if not frames:
              raise RuntimeError("No frames selected after frame reduction")

          with open(output_file, "wb") as f:
              f.write(struct.pack(
                  "<4sHHHHHH",
                  MAGIC,
                  VERSION,
                  WIDTH,
                  HEIGHT,
                  len(frames),
                  LOOP_COUNT,
                  0
              ))

              for idx, frame in enumerate(frames):
                  f.write(struct.pack("<HH", delays[idx], 0))
                  pixels = frame.load()
                  for y in range(HEIGHT):
                      for x in range(WIDTH):
                          r, g, b = pixels[x, y]
                          rgb565 = rgb888_to_rgb565(r, g, b)
                          f.write(struct.pack("<H", rgb565))

          print(f"Wrote: {output_file}")
          print(f"Output frame count: {len(frames)}")
          print(f"Output size: {os.path.getsize(output_file)} bytes")
          EOF

      - name: Clean old generated files
        run: |
          mkdir -p output
          find output -type f \( -name "*.webp" -o -name "*.anim" \) -delete
          rm -rf tmp_frames/*
          mkdir -p tmp_frames

      - name: Render all .star files and convert them
        shell: bash
        run: |
          set -euo pipefail

          found_any=false

          while IFS= read -r file; do
            found_any=true

            rel="${file#apps/}"
            stem="${rel%.star}"
            safe_name="${stem//\//_}"

            webp="output/${safe_name}.webp"
            anim="output/${safe_name}.anim"
            frames_dir="tmp_frames/${safe_name}"

            rm -rf "${frames_dir}"
            mkdir -p "${frames_dir}"

            echo "--------------------------------------------------"
            echo "Processing: ${file}"

            if [ "${USE_2X}" = "true" ]; then
              echo "Rendering in 2x mode"
              pixlet render -2 "$file" -o "$webp"
            else
              echo "Rendering in normal mode"
              pixlet render "$file" -o "$webp"
            fi

            echo "Extracting/coalescing frames with ImageMagick"
            if command -v magick >/dev/null 2>&1; then
              magick "$webp" -coalesce "${frames_dir}/frame_%03d.png"
            else
              convert "$webp" -coalesce "${frames_dir}/frame_%03d.png"
            fi

            python3 scripts/png_frames_to_anim_rgb565.py "${frames_dir}" "$anim"

            echo "Generated:"
            echo "  $webp"
            echo "  $anim"

          done < <(find apps -type f -name "*.star" | sort)

          if [ "$found_any" = "false" ]; then
            echo "No .star files found under apps/"
            exit 1
          fi

      - name: Show generated files
        run: |
          echo "Generated files:"
          find output -type f | sort

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A output

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Pixlet outputs [skip ci]"
            git push
          fi
