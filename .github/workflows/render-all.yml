name: Render and Convert All Pixlet Apps

on:
  push:
    branches: [ main ]
  schedule:
    # Runs every 10 minutes (Subject to standard GitHub queue delays)
    - cron: '2,12,22,32,42,52 * * * *'
  workflow_dispatch:

env:
  TZ: "America/Toronto"  
  USE_2X: "true"
  PANEL_WIDTH: "128"
  PANEL_HEIGHT: "64"
  MAX_FRAMES: "60"
  MIN_DELAY_MS: "50"
  BASE_DELAY_MS: "100"

permissions:
  contents: write

jobs:
  render_and_convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebp-dev webp imagemagick python3 python3-pip curl
          pip3 install pillow

      - name: Install Pixlet
        run: |
          curl -LO "https://github.com/tronbyt/pixlet/releases/download/v0.53.0/pixlet_v0.53.0_linux-amd64.tar.gz"
          tar -xvf "pixlet_v0.53.0_linux-amd64.tar.gz"
          chmod +x ./pixlet
          sudo mv ./pixlet /usr/local/bin/pixlet
          pixlet version

      - name: Create working directories
        run: |
          mkdir -p output scripts tmp_frames

      - name: Create PNG frames to INFOMATRIX3D
        run: |
          cat > scripts/png_frames_to_anim_rgb565.py << 'EOF'
          from PIL import Image
          import struct
          import sys
          import os
          import glob
          import hashlib
          import math

          frames_dir = sys.argv[1]
          output_file = sys.argv[2]

          WIDTH = int(os.environ.get("PANEL_WIDTH", "128"))
          HEIGHT = int(os.environ.get("PANEL_HEIGHT", "64"))
          MAX_FRAMES = int(os.environ.get("MAX_FRAMES", "60"))
          MIN_DELAY_MS = int(os.environ.get("MIN_DELAY_MS", "50"))
          BASE_DELAY_MS = int(os.environ.get("BASE_DELAY_MS", "100"))

          MAGIC = b'R565'
          VERSION = 1
          LOOP_COUNT = 0

          def rgb888_to_rgb565(r, g, b):
              return ((r & 0xF8) << 8) | ((g & 0xFC) << 3) | (b >> 3)

          def image_hash(img):
              return hashlib.md5(img.tobytes()).hexdigest()

          frame_files = sorted(glob.glob(os.path.join(frames_dir, "frame_*.png")))
          if not frame_files:
              raise RuntimeError(f"No extracted PNG frames found in {frames_dir}")

          total_frames = len(frame_files)
          frame_step = max(1, math.ceil(total_frames / MAX_FRAMES))

          frames = []
          delays = []
          last_hash = None

          for i, frame_file in enumerate(frame_files):
              if i % frame_step != 0:
                  continue

              img = Image.open(frame_file).convert("RGB")
              img = img.resize((WIDTH, HEIGHT), Image.Resampling.LANCZOS)
              h = image_hash(img)
              effective_delay = BASE_DELAY_MS * frame_step
              if effective_delay < MIN_DELAY_MS:
                  effective_delay = MIN_DELAY_MS

              if last_hash is not None and h == last_hash:
                  delays[-1] += effective_delay
                  continue

              frames.append(img)
              delays.append(effective_delay)
              last_hash = h

              if len(frames) >= MAX_FRAMES:
                  break

          if not frames:
              raise RuntimeError("No frames selected")

          with open(output_file, "wb") as f:
              f.write(struct.pack("<4sHHHHHH", MAGIC, VERSION, WIDTH, HEIGHT, len(frames), LOOP_COUNT, 0))
              for idx, frame in enumerate(frames):
                  f.write(struct.pack("<HH", delays[idx], 0))
                  pixels = frame.load()
                  for y in range(HEIGHT):
                      for x in range(WIDTH):
                          r, g, b = pixels[x, y]
                          f.write(struct.pack("<H", rgb888_to_rgb565(r, g, b)))
          EOF

      - name: Clean old generated files
        run: |
          mkdir -p output
          if [ "${USE_2X}" = "true" ]; then
            find output -type f \( -name "*2x.webp" -o -name "*2x.anim" \) -delete
          else
            find output -type f \( -name "*.webp" -o -name "*.anim" \) -delete
          fi
          rm -rf tmp_frames/*
          mkdir -p tmp_frames

      - name: Render all .star files and convert them
        shell: bash
        run: |
          set -euo pipefail
          found_any=false

          while IFS= read -r file; do
            found_any=true
            rel="${file#apps/}"
            stem="${rel%.star}"
            safe_name="${stem//\//_}"
            frames_dir="tmp_frames/${safe_name}"

            rm -rf "${frames_dir}"
            mkdir -p "${frames_dir}"

            if [ "${USE_2X}" = "true" ]; then
              webp="output/${safe_name}2x.webp"
              anim="output/${safe_name}2x.anim"
              pixlet render -2 "$file" -o "$webp"
            else
              webp="output/${safe_name}.webp"
              anim="output/${safe_name}.anim"
              pixlet render "$file" -o "$webp"
            fi

            if command -v magick >/dev/null 2>&1; then
              magick "$webp" -coalesce "${frames_dir}/frame_%03d.png"
            else
              convert "$webp" -coalesce "${frames_dir}/frame_%03d.png"
            fi

            python3 scripts/png_frames_to_anim_rgb565.py "${frames_dir}" "$anim"
          done < <(find apps -type f -name "*.star" | sort)

          if [ "$found_any" = "false" ]; then
            echo "No .star files found under apps/"
            exit 1
          fi

      - name: Show generated files
        run: |
          find output -type f | sort

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A output

          if ! git diff --staged --quiet; then
            git commit -m "Update Pixlet renders [skip ci]"
            git push origin main
          else
            echo "No rendering changes detected."
          fi
