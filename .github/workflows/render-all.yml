name: Render and Convert All Pixlet Apps

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

env:
  # ------------------------------------------------------------------
  # Rendering options
  # ------------------------------------------------------------------
  # Set to "true" to render all apps at 2x (128x64) using pixlet -2
  # Set to "false" to render at normal size and let converter resize
  USE_2X: "true"

  # ------------------------------------------------------------------
  # Output panel size
  # ------------------------------------------------------------------
  PANEL_WIDTH: "128"
  PANEL_HEIGHT: "64"

  # ------------------------------------------------------------------
  # Animation reduction knobs
  # ------------------------------------------------------------------
  # Keep every Nth frame:
  #   1 = keep all frames
  #   2 = keep every 2nd frame
  #   3 = keep every 3rd frame



  FRAME_STEP: "1"

  # Maximum number of frames to keep in output
  MAX_FRAMES: "60"

  # Minimum per-frame delay after reduction
  MIN_DELAY_MS: "50"

jobs:
  render_and_convert:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebp-dev webp python3 python3-pip curl
          pip3 install pillow

      - name: Install Pixlet
        run: |
          curl -LO "https://github.com/tronbyt/pixlet/releases/download/v0.53.0/pixlet_v0.53.0_linux-amd64.tar.gz"
          tar -xvf "pixlet_v0.53.0_linux-amd64.tar.gz"
          chmod +x ./pixlet
          sudo mv ./pixlet /usr/local/bin/pixlet
          pixlet version

      - name: Create working directories
        run: |
          mkdir -p output scripts

      - name: Create WebP to packed RGB565 converter
        run: |
          cat > scripts/webp_to_anim_rgb565.py << 'EOF'
          from PIL import Image, ImageSequence
          import struct
          import sys
          import os

          input_file = sys.argv[1]
          output_file = sys.argv[2]

          WIDTH = int(os.environ.get("PANEL_WIDTH", "128"))
          HEIGHT = int(os.environ.get("PANEL_HEIGHT", "64"))

          FRAME_STEP = int(os.environ.get("FRAME_STEP", "2"))
          MAX_FRAMES = int(os.environ.get("MAX_FRAMES", "15"))
          MIN_DELAY_MS = int(os.environ.get("MIN_DELAY_MS", "60"))

          MAGIC = b'R565'
          VERSION = 1
          LOOP_COUNT = 0

          def rgb888_to_rgb565(r, g, b):
              return ((r & 0xF8) << 8) | ((g & 0xFC) << 3) | (b >> 3)

          img = Image.open(input_file)
          source_frames = list(ImageSequence.Iterator(img))

          frames = []
          delays = []

          for i, frame in enumerate(source_frames):
              # Keep every Nth frame
              if FRAME_STEP > 1 and (i % FRAME_STEP != 0):
                  continue

              rgba = frame.convert("RGBA")
              canvas = Image.new("RGBA", rgba.size, (0, 0, 0, 255))
              composed = Image.alpha_composite(canvas, rgba).convert("RGB")

              # Resize to target panel size
              composed = composed.resize((WIDTH, HEIGHT), Image.Resampling.LANCZOS)

              delay = frame.info.get("duration", img.info.get("duration", 100))
              if delay is None or delay <= 0:
                  delay = 100

              # Compensate delay when skipping frames
              delay = int(delay) * max(1, FRAME_STEP)

              if delay < MIN_DELAY_MS:
                  delay = MIN_DELAY_MS

              frames.append(composed)
              delays.append(delay)

              if len(frames) >= MAX_FRAMES:
                  break

          if not frames:
              raise RuntimeError(f"No usable frames found in {input_file}")

          with open(output_file, "wb") as f:
              # File header:
              # magic[4], version, width, height, frameCount, loopCount, reserved
              f.write(struct.pack(
                  "<4sHHHHHH",
                  MAGIC,
                  VERSION,
                  WIDTH,
                  HEIGHT,
                  len(frames),
                  LOOP_COUNT,
                  0
              ))

              # Each frame:
              # delayMs (uint16), reserved (uint16), RGB565 pixel data
              for idx, frame in enumerate(frames):
                  f.write(struct.pack("<HH", delays[idx], 0))
                  pixels = frame.load()
                  for y in range(HEIGHT):
                      for x in range(WIDTH):
                          r, g, b = pixels[x, y]
                          rgb565 = rgb888_to_rgb565(r, g, b)
                          f.write(struct.pack("<H", rgb565))

          total_size = os.path.getsize(output_file)

          print(f"Input file: {input_file}")
          print(f"Source frame count: {len(source_frames)}")
          print(f"Output frame count: {len(frames)}")
          print(f"Frame step: {FRAME_STEP}")
          print(f"Max frames: {MAX_FRAMES}")
          print(f"Min delay: {MIN_DELAY_MS} ms")
          print(f"Output size: {total_size} bytes")
          print(f"Wrote: {output_file}")
          EOF

      - name: Clean old generated files
        run: |
          mkdir -p output
          find output -type f \( -name "*.webp" -o -name "*.anim" \) -delete

      - name: Render all .star files and convert them
        shell: bash
        run: |
          set -euo pipefail

          found_any=false

          while IFS= read -r file; do
            found_any=true

            rel="${file#apps/}"
            stem="${rel%.star}"
            safe_name="${stem//\//_}"

            webp="output/${safe_name}.webp"
            anim="output/${safe_name}.anim"

            echo "--------------------------------------------------"
            echo "Processing: ${file}"

            if [ "${USE_2X}" = "true" ]; then
              echo "Rendering in 2x mode"
              pixlet render -2 "$file" -o "$webp"
            else
              echo "Rendering in normal mode"
              pixlet render "$file" -o "$webp"
            fi

            python3 scripts/webp_to_anim_rgb565.py "$webp" "$anim"

            echo "Generated:"
            echo "  $webp"
            echo "  $anim"

          done < <(find apps -type f -name "*.star" | sort)

          if [ "$found_any" = "false" ]; then
            echo "No .star files found under apps/"
            exit 1
          fi

      - name: Show generated files
        run: |
          echo "Generated files:"
          find output -type f | sort

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A output

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Pixlet outputs [skip ci]"
            git push
          fi
