<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InfoMatrix Pixlet App Catalog</title>
  <style>
    :root {
      --bg: #f6f8fa;
      --panel: #ffffff;
      --text: #1f2328;
      --muted: #656d76;
      --border: #d0d7de;
      --shadow: 0 8px 24px rgba(31, 35, 40, 0.08);
      --primary: #0969da;
      --primary-hover: #0550ae;
      --success: #1a7f37;
      --success-hover: #116329;
      --secondary: #57606a;
      --secondary-hover: #424a53;
      --badge: #eaeef2;
      --selected: #dbeafe;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      background: #fff;
      padding: 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .sidebar h1 {
      margin: 0;
      font-size: 24px;
    }

    .sidebar p {
      margin: 8px 0 16px 0;
      font-size: 13px;
      color: var(--muted);
    }

    .search {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 14px;
      outline: none;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .pill {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .app-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .app-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      padding: 12px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .app-item:hover {
      border-color: var(--primary);
    }

    .app-item.active {
      background: var(--selected);
      border-color: var(--primary);
    }

    .app-item-title {
      font-size: 14px;
      font-weight: 700;
      margin: 0 0 6px 0;
      word-break: break-word;
    }

    .app-item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      background: var(--badge);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      color: var(--muted);
    }

    .content {
      padding: 24px;
    }

    .detail {
      max-width: 1100px;
      margin: 0 auto;
    }

    .detail-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .detail-header {
      padding: 22px 22px 0 22px;
    }

    .detail-title {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      word-break: break-word;
    }

    .detail-meta {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .main-preview {
      margin: 18px 22px 0 22px;
      background: #0b0f14;
      border-radius: 18px;
      padding: 22px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 220px;
    }

    .main-preview img {
      width: 256px;
      max-width: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 18px 22px 22px 22px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      text-decoration: none;
      text-align: center;
      color: #fff;
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }

    .btn-success { background: var(--success); }
    .btn-success:hover { background: var(--success-hover); }

    .btn-secondary { background: var(--secondary); }
    .btn-secondary:hover { background: var(--secondary-hover); }

    .section {
      border-top: 1px solid var(--border);
      padding: 22px;
    }

    .section h3 {
      margin: 0 0 14px 0;
      font-size: 16px;
    }

    .variant-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .variant-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
    }

    .variant-preview {
      background: #0b0f14;
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 110px;
    }

    .variant-preview img {
      width: 120px;
      max-width: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .variant-body {
      padding: 14px;
    }

    .variant-name-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .variant-name {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      word-break: break-word;
    }

    .config-box {
      margin-top: 10px;
      background: #f6f8fa;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .variant-actions {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .empty-state {
      background: #fff;
      border: 1px dashed var(--border);
      border-radius: 18px;
      padding: 30px 20px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 1100px) {
      .page {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }

    @media (max-width: 760px) {
      .action-grid {
        grid-template-columns: 1fr 1fr;
      }

      .variant-actions {
        grid-template-columns: 1fr;
      }

      .main-preview img {
        width: 200px;
      }
    }

    @media (max-width: 560px) {
      .action-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <aside class="sidebar">
      <h1>📺 App Catalog</h1>
      <p>Browse apps, inspect default previews, and copy variant URLs.</p>

      <input id="searchInput" class="search" type="text" placeholder="Search apps..." />

      <div class="stats">
        <div class="pill" id="statApps">Apps: 0</div>
        <div class="pill" id="statVariants">Variants: 0</div>
      </div>

      <div id="appList" class="app-list"></div>
    </aside>

    <main class="content">
      <div class="detail" id="detailPane">
        <div class="empty-state">Select an app to view details.</div>
      </div>
    </main>
  </div>

  <script>
    const RAW_BASE_URL = "__RAW_BASE_URL__";
    const INDEX_PATH = "output/webp/index.json";

    let catalogData = {};
    let allAppNames = [];
    let filteredAppNames = [];
    let selectedApp = null;

    async function loadCatalog() {
      const response = await fetch(INDEX_PATH, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Failed to load ${INDEX_PATH}: ${response.status}`);
      }
      return response.json();
    }

    function assetUrl(relPath) {
      return `${RAW_BASE_URL}/${relPath}`;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatConfig(config) {
      if (!config || Object.keys(config).length === 0) {
        return "No config";
      }
      return JSON.stringify(config, null, 2);
    }

    async function copyText(btn, text) {
      const original = btn.textContent;
      try {
        if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
          await navigator.clipboard.writeText(text);
        } else {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.left = "-9999px";
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
        }
        btn.textContent = "✓ Copied!";
        setTimeout(() => btn.textContent = original, 1800);
      } catch (e) {
        console.error(e);
        prompt("Copy manually:", text);
      }
    }

    function findEntry(entries, name) {
      return entries.find(x => x.name === name);
    }

    function variantEntries(entries) {
      return entries.filter(x => x.name !== "default" && x.name !== "default_2x");
    }

    function buildAppList() {
      const listEl = document.getElementById("appList");

      if (!filteredAppNames.length) {
        listEl.innerHTML = `<div class="empty-state">No matching apps.</div>`;
        return;
      }

      listEl.innerHTML = filteredAppNames.map(appName => {
        const entries = catalogData[appName] || [];
        const variants = variantEntries(entries);

        return `
          <div class="app-item ${selectedApp === appName ? "active" : ""}" onclick="selectApp('${escapeHtml(appName)}')">
            <div class="app-item-title">${escapeHtml(appName)}</div>
            <div class="app-item-meta">
              <span class="badge">default</span>
              <span class="badge">default 2x</span>
              <span class="badge">${variants.length} variant${variants.length === 1 ? "" : "s"}</span>
            </div>
          </div>
        `;
      }).join("");
    }

    function buildDetail(appName) {
      const detailPane = document.getElementById("detailPane");
      const entries = catalogData[appName] || [];
      const defaultEntry = findEntry(entries, "default");
      const default2xEntry = findEntry(entries, "default_2x");
      const variants = variantEntries(entries);

      const defaultRaw = defaultEntry ? assetUrl(defaultEntry.file) : "";
      const default2xRaw = default2xEntry ? assetUrl(default2xEntry.file) : "";

      detailPane.innerHTML = `
        <div class="detail-card">
          <div class="detail-header">
            <h2 class="detail-title">${escapeHtml(appName)}</h2>
            <div class="detail-meta">
              <span class="badge">default</span>
              <span class="badge">default 2x</span>
              <span class="badge">${variants.length} variant${variants.length === 1 ? "" : "s"}</span>
            </div>
          </div>

          <div class="main-preview">
            ${
              defaultEntry
                ? `<img src="${escapeHtml(defaultEntry.file)}" alt="${escapeHtml(appName)} default preview">`
                : `<div class="empty-state">No default preview</div>`
            }
          </div>

          <div class="action-grid">
            <button class="btn btn-success" onclick="copyText(this, '${defaultRaw}')">Copy Default URL</button>
            <a class="btn btn-secondary" href="${defaultRaw}" target="_blank" rel="noopener noreferrer">Open Default</a>
            <button class="btn btn-success" onclick="copyText(this, '${default2xRaw}')">Copy Default 2x URL</button>
            <a class="btn btn-secondary" href="${default2xRaw}" target="_blank" rel="noopener noreferrer">Open Default 2x</a>
          </div>

          <div class="section">
            <h3>Variants</h3>
            ${
              variants.length
                ? `
                  <div class="variant-grid">
                    ${variants.map(entry => {
                      const rawUrl = assetUrl(entry.file);
                      return `
                        <div class="variant-card">
                          <div class="variant-preview">
                            <img src="${escapeHtml(entry.file)}" alt="${escapeHtml(entry.name)}">
                          </div>
                          <div class="variant-body">
                            <div class="variant-name-row">
                              <h4 class="variant-name">${escapeHtml(entry.name)}</h4>
                              <span class="badge">${entry.is_2x ? "2x" : "1x"}</span>
                            </div>

                            <div class="config-box">${escapeHtml(formatConfig(entry.config))}</div>

                            <div class="variant-actions">
                              <button class="btn btn-success" onclick="copyText(this, '${rawUrl}')">Copy Variant URL</button>
                              <a class="btn btn-secondary" href="${rawUrl}" target="_blank" rel="noopener noreferrer">Open Variant</a>
                            </div>
                          </div>
                        </div>
                      `;
                    }).join("")}
                  </div>
                `
                : `<div class="empty-state">No additional variants for this app.</div>`
            }
          </div>
        </div>
      `;
    }

    function selectApp(appName) {
      selectedApp = appName;
      buildAppList();
      buildDetail(appName);
    }

    function applySearch() {
      const value = document.getElementById("searchInput").value.trim().toLowerCase();
      filteredAppNames = allAppNames.filter(app => app.toLowerCase().includes(value));

      if (!filteredAppNames.includes(selectedApp)) {
        selectedApp = filteredAppNames[0] || null;
      }

      buildAppList();

      if (selectedApp) {
        buildDetail(selectedApp);
      } else {
        document.getElementById("detailPane").innerHTML =
          `<div class="empty-state">No matching apps.</div>`;
      }

      document.getElementById("statApps").textContent = `Apps: ${filteredAppNames.length}`;
    }

    async function init() {
      try {
        catalogData = await loadCatalog();
        allAppNames = Object.keys(catalogData).sort((a, b) => a.localeCompare(b));
        filteredAppNames = [...allAppNames];

        let totalVariants = 0;
        for (const appName of allAppNames) {
          totalVariants += variantEntries(catalogData[appName]).length;
        }

        document.getElementById("statApps").textContent = `Apps: ${allAppNames.length}`;
        document.getElementById("statVariants").textContent = `Variants: ${totalVariants}`;

        selectedApp = allAppNames[0] || null;

        buildAppList();

        if (selectedApp) {
          buildDetail(selectedApp);
        } else {
          document.getElementById("detailPane").innerHTML =
            `<div class="empty-state">No apps found in output/webp/index.json</div>`;
        }

        document.getElementById("searchInput").addEventListener("input", applySearch);
      } catch (err) {
        console.error(err);
        document.getElementById("appList").innerHTML =
          `<div class="empty-state">Failed to load app list.</div>`;
        document.getElementById("detailPane").innerHTML =
          `<div class="empty-state">Failed to load catalog metadata.<br>${escapeHtml(err.message)}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
